services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clinic_api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__SqlServerConnection=Server=sqlserver,1433;Database=ClinicManagementDB;User Id=sa;Password=Clinic@Password123;TrustServerCertificate=True;
      - JwtSettings__Key=YourSuperSecretKeyHereMustBe32CharsMin!
      - JwtSettings__Issuer=ClinicManagementSystem
      - JwtSettings__Audience=ClinicManagementSystemUsers
      - JwtSettings__DurationInMinutes=60
      - JwtSettings__RefreshTokenDurationInDays=7
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - api_logs:/app/Logs
    networks:
      - clinic_network
    restart: unless-stopped

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: clinic_sqlserver
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Clinic@Password123
      - MSSQL_PID=Express
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - clinic_network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Clinic@Password123 -Q 'SELECT 1' -No"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  sqlserver_data:
  api_logs:

networks:
  clinic_network:
    driver: bridge